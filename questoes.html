<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Compreensão e Interpretação De Textos</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="shortcut icon" href="./img/logo (2).ico" type="image/x-icon" />

    <style>
      .container {
        max-width: 700px;

        margin: auto;

        padding: 20px;
      }

      .pergunta {
        font-size: 20px;

        margin-bottom: 20px;
      }

      .alternativa {
        display: block;

        padding: 12px;

        margin-bottom: 10px;

        border: 1px solid #ddd;

        border-radius: 8px;

        cursor: pointer;
      }

      .alternativa:hover {
        background: #f0f6ff;
      }

      .botao {
        background: #07559b;

        color: white;

        border: none;

        padding: 12px;

        width: 100%;

        border-radius: 8px;

        font-size: 16px;

        margin-top: 20px;

        cursor: pointer;
      }

      .resultado {
        margin-top: 20px;

        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div id="pergunta" class="pergunta"></div>

      <div id="alternativas"></div>

      <button class="botao" onclick="verificar()">Responder</button>

      <div id="resultado" class="resultado"></div>

      <button class="botao" onclick="proxima()">Próxima questão</button>
    </div>

    <script src="./js/questoes.js"></script>
  </body>
</html>
