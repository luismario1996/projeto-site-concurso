<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        /* MENU LATERAL */
.menu-lateral {
  position: fixed;
  top: 0;
  left: -300px;
  width: 280px;
  height: 100%;
  background: #0a1a2f;
  color: white;
  transition: left 0.3s ease;
  z-index: 1000;
  padding: 20px;
}

.menu-lateral.ativo {
  left: 0;
}

/* OVERLAY ESCURO */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  z-index: 900;
}

#overlay.ativo {
  display: block;
}

/* HAMBURGUER */
.hamburger {
  width: 25px;
  height: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
}

.hamburger span {
  height: 3px;
  background: #000;
  border-radius: 2px;
  transition: 0.3s;
}

/* ANIMAÇÃO PARA VIRAR X */
.hamburger.ativo span:nth-child(1) {
  transform: rotate(45deg) translate(5px, 5px);
}

.hamburger.ativo span:nth-child(2) {
  opacity: 0;
}

.hamburger.ativo span:nth-child(3) {
  transform: rotate(-45deg) translate(5px, -5px);


}
    </style>
</head>
<body>


  <header class="topo">
  <div class="container-topo">

    <button class="menu-btn" onclick="toggleMenu()">
      <div class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </button>

    <a href="index.html">
      <img width="90px" src="./img/focoquestao200.png" alt="" />
    </a>

    <div class="barra-busca">
      <input type="text" id="buscarQuestoes" />
      <button onclick="buscarQuestoes()">
        <i class="fas fa-search"></i>
      </button>
    </div>

  </div>
</header>
<div id="overlay" onclick="toggleMenu()"></div>
    <script>

        function toggleMenu() {
  const menu = document.getElementById("menu");
  const overlay = document.getElementById("overlay");
  const hamburger = document.querySelector(".hamburger");

  menu.classList.toggle("ativo");
  overlay.classList.toggle("ativo");
  hamburger.classList.toggle("ativo");
}
    </script>
</body>
</html>
