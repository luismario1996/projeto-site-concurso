<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Banco De Dados Concurso</title>
    <link rel="shortcut icon" href="./img/icone.ico" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <!-- LOGIN -->
    <div class="container" id="login">
      <h1>Banco De Dados Concurso</h1>
      <input type="text" id="nome" placeholder="Digite seu nome" />
      <button onclick="entrar()">Entrar</button>
    </div>

    <!-- MENU -->
    <div class="container hidden" id="menu">
      <h2 id="bemvindo"></h2>
      <h2>Escolha a Matéria</h2>
      <div class="cards-container" id="cardsMaterias"></div>
    </div>

    <!-- SUBTEMAS -->
    <div class="container hidden" id="subtemas">
      <h2 id="tituloSubtema"></h2>
      <div class="cards-container" id="listaSubtemas"></div>
      <button class="voltar" onclick="voltarMenu()">Voltar</button>
    </div>

    <!-- QUIZ -->
    <div class="container hidden" id="quiz">
      <h2 id="tituloQuiz"></h2>
      <div id="statusQuestao"></div>
      <div id="infoQuestao"></div>
      <h3 id="tituloQuestao"></h3>
      <div id="textoBase" style="text-align: left; margin-bottom: 15px"></div>
      <div id="comandoQuestao" style="margin-bottom: 15px"></div>
      <div id="alternativas"></div>
      <button onclick="voltarSubtema()" class="voltar">Voltar</button>
      <button onclick="proxima()" id="btnProxima" class="hidden">
        Próxima
      </button>
    </div>

    <!-- RESULTADO -->
    <div class="container hidden" id="resultado">
      <h2>Resultado Final</h2>
      <p id="placar"></p>
      <canvas id="grafico"></canvas>
      <button onclick="voltarMenu()">Voltar ao Menu</button>
    </div>

    <!-- FOOTER -->
    <footer>Desenvolvido por Luis Fernandes</footer>

    <script src="./script.js"></script>
  </body>
</html>
